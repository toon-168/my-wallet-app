<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บันทึกรายรับรายจ่าย..เพื่อวันที่ดีกว่า</title>
    <!-- Tailwind CSS สำหรับการตกแต่ง UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons สำหรับไอคอนสวยๆ -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js สำหรับการแสดงผลกราฟ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Sarabun', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        .loading-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(4px); 
            z-index: 9999; 
            align-items: center; 
            justify-content: center; 
        }
        .loading-overlay.active { display: flex; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .filter-active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .sync-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        /* ตกแต่ง Card ให้ดูทันสมัย */
        .summary-card {
            transition: transform 0.2s;
        }
        .summary-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-10">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="bg-white p-6 rounded-3xl shadow-2xl flex flex-col items-center gap-4">
            <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="font-bold text-blue-600">กำลังเชื่อมต่อฐานข้อมูล...</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-6 md:px-8 md:py-10">
        <!-- Header -->
        <header class="mb-8 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-3 rounded-2xl shadow-xl shadow-blue-200 text-white">
                    <i data-lucide="layout-dashboard" class="w-7 h-7"></i>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-slate-800">Finance Pro</h1>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-[0.2em]">Personal Expense Tracker</p>
                </div>
            </div>
            
            <div id="connection-status" class="flex items-center gap-3 bg-white px-5 py-2.5 rounded-2xl border border-slate-200 shadow-sm">
                <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-300"></div>
                <p id="status-text" class="text-slate-500 text-[11px] font-bold uppercase tracking-wider">Starting...</p>
                <button onclick="fetchData(true)" class="ml-2 hover:bg-slate-100 p-1.5 rounded-lg transition-colors">
                    <i data-lucide="refresh-cw" id="refresh-icon" class="w-4 h-4 text-slate-400"></i>
                </button>
            </div>
        </header>

        <!-- Wallet Tabs -->
        <div class="mb-8 inline-flex p-1.5 bg-slate-200/50 rounded-2xl w-full sm:w-auto">
            <button onclick="setViewWallet('Main')" id="tab-main" class="flex-1 px-10 py-3 rounded-xl text-sm font-bold transition-all bg-white text-blue-600 shadow-sm">
                <span class="flex items-center justify-center gap-2"><i data-lucide="wallet" class="w-4 h-4"></i> Main</span>
            </button>
            <button onclick="setViewWallet('Savings')" id="tab-savings" class="flex-1 px-10 py-3 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-700">
                <span class="flex items-center justify-center gap-2"><i data-lucide="piggy-bank" class="w-4 h-4"></i> Savings</span>
            </button>
        </div>

        <!-- Dashboard Summary -->
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 mb-10">
            <!-- Cards Section -->
            <div class="xl:col-span-4 grid grid-cols-1 sm:grid-cols-3 xl:grid-cols-1 gap-5">
                <!-- ยอดคงเหลือ - สีฟ้า -->
                <div class="summary-card bg-blue-600 p-6 rounded-[2rem] shadow-xl shadow-blue-100 border border-blue-500 relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 text-white/10 group-hover:scale-110 transition-transform">
                        <i data-lucide="banknote" class="w-24 h-24"></i>
                    </div>
                    <p class="text-blue-100 text-xs font-bold uppercase tracking-widest">ยอดคงเหลือรวม</p>
                    <p id="display-balance" class="text-3xl font-bold text-white mt-2">฿0.00</p>
                </div>
                <!-- รายรับ - สีเขียว -->
                <div class="summary-card bg-emerald-500 p-6 rounded-[2rem] shadow-xl shadow-emerald-100 border border-emerald-400 relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 text-white/10 group-hover:scale-110 transition-transform">
                        <i data-lucide="trending-up" class="w-24 h-24"></i>
                    </div>
                    <p class="text-emerald-50 text-xs font-bold uppercase tracking-widest">รายรับทั้งหมด</p>
                    <p id="display-income" class="text-3xl font-bold text-white mt-2">฿0.00</p>
                </div>
                <!-- รายจ่าย - สีแดง -->
                <div class="summary-card bg-rose-500 p-6 rounded-[2rem] shadow-xl shadow-rose-100 border border-rose-400 relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 text-white/10 group-hover:scale-110 transition-transform">
                        <i data-lucide="trending-down" class="w-24 h-24"></i>
                    </div>
                    <p class="text-rose-50 text-xs font-bold uppercase tracking-widest">รายจ่ายทั้งหมด</p>
                    <p id="display-expense" class="text-3xl font-bold text-white mt-2">฿0.00</p>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="xl:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col items-center">
                    <h3 class="text-xs font-bold text-slate-400 uppercase self-start mb-4">สัดส่วนเปรียบเทียบ</h3>
                    <div class="w-full h-full min-h-[220px]">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col items-center">
                    <h3 class="text-xs font-bold text-slate-400 uppercase self-start mb-4">หมวดหมู่รายจ่าย</h3>
                    <div class="w-full h-full min-h-[220px]">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-4 order-2 lg:order-1">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 sticky top-10">
                    <div class="flex justify-between items-center mb-8">
                        <h2 id="form-title" class="text-lg font-bold text-slate-800">ลงบันทึกใหม่</h2>
                        <button id="btn-cancel" onclick="resetForm()" class="hidden text-[10px] font-bold text-red-500 px-3 py-1.5 bg-red-50 rounded-xl uppercase hover:bg-red-100 transition-colors">ยกเลิกแก้ไข</button>
                    </div>
                    
                    <form id="transaction-form" class="space-y-5">
                        <input type="hidden" id="edit-id">
                        
                        <!-- Type Switcher -->
                        <div class="flex p-1.5 bg-slate-100 rounded-2xl">
                            <button type="button" id="btn-inc" onclick="setType('income')" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-500">รายรับ</button>
                            <button type="button" id="btn-exp" onclick="setType('expense')" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all bg-white text-red-600 shadow-sm">รายจ่าย</button>
                        </div>

                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1.5">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">กระเป๋า</label>
                                    <select id="wallet" class="w-full px-4 py-3.5 bg-slate-50 border-0 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                                        <option value="Main">Main</option>
                                        <option value="Savings">Savings</option>
                                    </select>
                                </div>
                                <div class="space-y-1.5">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">วันที่</label>
                                    <input type="date" id="date" required class="w-full px-4 py-3.5 bg-slate-50 border-0 rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                            </div>

                            <div class="space-y-1.5">
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">รายละเอียดรายการ</label>
                                <input type="text" id="desc" placeholder="เช่น ค่าอาหารกลางวัน..." required class="w-full px-5 py-4 bg-slate-50 border-0 rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1.5">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">จำนวนเงิน (฿)</label>
                                    <input type="number" id="amount" step="0.01" required placeholder="0.00" class="w-full px-5 py-3.5 bg-slate-50 border-0 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                                <div class="space-y-1.5">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">หมวดหมู่</label>
                                    <select id="category" class="w-full px-4 py-3.5 bg-slate-50 border-0 rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                        <option>อาหาร</option>
                                        <option>เดินทาง</option>
                                        <option>บ้าน/ที่พัก</option>
                                        <option>ช้อปปิ้ง</option>
                                        <option>เงินเดือน</option>
                                        <option>ลงทุน</option>
                                        <option>อื่นๆ</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <button type="submit" id="btn-submit" class="w-full py-5 bg-red-600 text-white font-bold rounded-[1.5rem] shadow-xl shadow-red-100 active:scale-[0.97] transition-all text-sm mt-4 flex items-center justify-center gap-2">
                            <i data-lucide="check-circle-2" class="w-5 h-5"></i>
                            <span id="submit-text">บันทึกรายการ</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- History Section -->
            <div class="lg:col-span-8 order-1 lg:order-2">
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 flex flex-col h-full overflow-hidden">
                    <!-- Month Filters -->
                    <div class="p-6 border-b border-slate-50">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 ml-1 tracking-widest">ตัวเลือกแสดงตามเดือน</p>
                        <div class="flex gap-2 overflow-x-auto pb-2 custom-scrollbar no-scrollbar">
                            <button onclick="setMonthFilter('all')" id="m-all" class="px-6 py-2.5 rounded-xl text-xs font-bold border border-slate-200 flex-shrink-0 transition-all filter-active shadow-sm">ทั้งหมด</button>
                            <script>
                                const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
                                months.forEach((m, i) => {
                                    document.write(`<button onclick="setMonthFilter(${i+1})" id="m-${i+1}" class="px-6 py-2.5 rounded-xl text-xs font-bold border border-slate-200 flex-shrink-0 transition-all text-slate-500 hover:bg-slate-50">${m}</button>`);
                                });
                            </script>
                        </div>
                    </div>
                    
                    <div class="px-8 py-5 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                        <h2 class="text-sm font-bold text-slate-800">รายการล่าสุด</h2>
                        <span id="item-count" class="text-[10px] bg-white border border-slate-200 text-slate-500 px-3 py-1.5 rounded-full font-bold shadow-sm">0 Items</span>
                    </div>
                    
                    <div id="transaction-list" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar min-h-[500px] bg-white">
                        <!-- รายการจะถูกสร้างที่นี่โดย JS -->
                        <div class="flex flex-col items-center justify-center py-20 text-slate-300">
                            <i data-lucide="inbox" class="w-16 h-16 mb-4 opacity-20"></i>
                            <p class="font-bold">ไม่มีข้อมูลบันทึกในขณะนี้</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ส่วนที่ต้องแก้ไข: ใส่ URL ของ Google Apps Script ของคุณ ---
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUo7IF3bZrTdGvQORfsP6PEeJ01EvA2R00qwzgNql_APa3wTYl98HANvu9xaqzxnwJbQ/exec'; 

        // State Management
        let transactions = JSON.parse(localStorage.getItem('fpro_v2_cache') || '[]');
        let currentType = 'expense';
        let currentViewWallet = 'Main';
        let currentMonthFilter = 'all';
        let isEditing = false;
        let barChart = null, pieChart = null;

        const updateStatus = (s, t) => {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            dot.className = `w-2.5 h-2.5 rounded-full ${s === 'on' ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : (s === 'sync' ? 'bg-amber-500 sync-pulse' : 'bg-red-500')}`;
            txt.innerText = t;
        };

        // Fetch Data
        async function fetchData(showLoader = false) {
            if (showLoader) document.getElementById('loading-overlay').classList.add('active');
            updateStatus('sync', 'ซิงค์ข้อมูลล่าสุด...');
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                if (!response.ok) throw new Error();
                const data = await response.json();
                transactions = data.map(t => ({ ...t, amount: parseFloat(t.amount) || 0 }));
                localStorage.setItem('fpro_v2_cache', JSON.stringify(transactions));
                render();
                updateStatus('on', 'ออนไลน์ (Cloud)');
            } catch (err) { 
                updateStatus('off', 'ออฟไลน์ (Cache)');
            } finally { 
                document.getElementById('loading-overlay').classList.remove('active');
            }
        }

        // Render UI
        function render() {
            const list = document.getElementById('transaction-list');
            list.innerHTML = '';
            let incTotal = 0, expTotal = 0;

            const filtered = transactions.filter(t => {
                const walletMatch = t.wallet === currentViewWallet;
                const monthMatch = currentMonthFilter === 'all' || (new Date(t.date).getMonth() + 1) === parseInt(currentMonthFilter);
                return walletMatch && monthMatch;
            }).sort((a,b) => new Date(b.date) - new Date(a.date));

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-slate-300">
                        <i data-lucide="inbox" class="w-16 h-16 mb-4 opacity-20"></i>
                        <p class="font-bold">ไม่พบรายการที่คุณเลือก</p>
                    </div>
                `;
            }

            filtered.forEach(t => {
                const isInc = t.type === 'income';
                if (isInc) incTotal += t.amount; else expTotal += t.amount;
                
                const card = document.createElement('div');
                card.className = "flex items-center justify-between p-5 bg-slate-50 rounded-3xl hover:bg-white border border-transparent hover:border-slate-100 hover:shadow-xl hover:shadow-slate-100/50 transition-all group active:scale-[0.99]";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 flex items-center justify-center rounded-2xl ${isInc ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                            <i data-lucide="${isInc ? 'plus' : 'minus'}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm text-slate-800">${t.description}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${t.date.split('T')[0]} • ${t.category}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <span class="font-bold text-base ${isInc ? 'text-emerald-600' : 'text-rose-600'}">฿${t.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                        <div class="flex gap-2 md:opacity-0 md:group-hover:opacity-100 transition-all transform md:translate-x-2 md:group-hover:translate-x-0">
                            <button onclick="editItem('${t.id}')" class="p-2 text-blue-500 bg-white shadow-sm rounded-xl border border-slate-100 hover:bg-blue-50 transition-colors"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                            <button onclick="deleteItem('${t.id}')" class="p-2 text-red-400 bg-white shadow-sm rounded-xl border border-slate-100 hover:bg-red-50 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });

            document.getElementById('display-income').innerText = `฿${incTotal.toLocaleString()}`;
            document.getElementById('display-expense').innerText = `฿${expTotal.toLocaleString()}`;
            document.getElementById('display-balance').innerText = `฿${(incTotal - expTotal).toLocaleString()}`;
            document.getElementById('item-count').innerText = `${filtered.length} รายการ`;
            
            updateCharts(incTotal, expTotal, filtered);
            lucide.createIcons();
        }

        // Optimistic Update Sync
        async function syncDataOptimistic(payload, action) {
            updateStatus('sync', 'กำลังบันทึก...');
            
            // 1. Optimistic Update (UI ทันที)
            if (action === 'add') {
                transactions.unshift(payload);
            } else if (action === 'delete') {
                transactions = transactions.filter(t => t.id !== payload.id);
            } else if (action === 'update') {
                const idx = transactions.findIndex(t => t.id === payload.id);
                if (idx !== -1) transactions[idx] = payload;
            }
            
            render();
            localStorage.setItem('fpro_v2_cache', JSON.stringify(transactions));

            // 2. Background POST
            try {
                fetch(APPS_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ ...payload, action }) 
                }).then(() => {
                    updateStatus('on', 'ออนไลน์ (Synced)');
                });
            } catch (e) {
                updateStatus('off', 'การซิงค์ล่าช้า...');
            }
        }

        // UI Handlers
        function setMonthFilter(m) {
            currentMonthFilter = m;
            document.querySelectorAll('[id^="m-"]').forEach(btn => btn.classList.remove('filter-active', 'shadow-sm'));
            document.getElementById(`m-${m}`).classList.add('filter-active');
            render();
        }

        function setViewWallet(w) {
            currentViewWallet = w;
            const isMain = w === 'Main';
            document.getElementById('tab-main').className = `flex-1 px-10 py-3 rounded-xl text-sm font-bold transition-all ${isMain ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`;
            document.getElementById('tab-savings').className = `flex-1 px-10 py-3 rounded-xl text-sm font-bold transition-all ${!isMain ? 'bg-white text-purple-600 shadow-sm' : 'text-slate-500'}`;
            render();
        }

        function setType(t) {
            currentType = t;
            const isInc = t === 'income';
            document.getElementById('btn-inc').className = `flex-1 py-2.5 rounded-xl text-xs font-bold transition-all ${isInc ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`;
            document.getElementById('btn-exp').className = `flex-1 py-2.5 rounded-xl text-xs font-bold transition-all ${!isInc ? 'bg-white text-red-600 shadow-sm' : 'text-slate-500'}`;
            
            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.className = `w-full py-5 ${isInc ? 'bg-emerald-600 shadow-emerald-100' : 'bg-rose-600 shadow-rose-100'} text-white font-bold rounded-[1.5rem] shadow-xl active:scale-[0.97] transition-all text-sm mt-4 flex items-center justify-center gap-2`;
        }

        document.getElementById('transaction-form').onsubmit = (e) => {
            e.preventDefault();
            const payload = {
                id: document.getElementById('edit-id').value || Date.now().toString(),
                date: document.getElementById('date').value,
                description: document.getElementById('desc').value,
                amount: parseFloat(document.getElementById('amount').value),
                type: currentType,
                category: document.getElementById('category').value,
                wallet: document.getElementById('wallet').value
            };
            syncDataOptimistic(payload, isEditing ? 'update' : 'add');
            resetForm();
        };

        function editItem(id) {
            const item = transactions.find(t => t.id == id);
            if (!item) return;
            isEditing = true;
            document.getElementById('edit-id').value = item.id;
            document.getElementById('date').value = item.date.split('T')[0];
            document.getElementById('desc').value = item.description;
            document.getElementById('amount').value = item.amount;
            document.getElementById('category').value = item.category;
            document.getElementById('wallet').value = item.wallet;
            setType(item.type);
            document.getElementById('form-title').innerText = "แก้ไขข้อมูล";
            document.getElementById('submit-text').innerText = "อัปเดตรายการ";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteItem(id) { 
            if (confirm('คุณต้องการลบรายการนี้ใช่หรือไม่? ข้อมูลใน Sheet จะถูกลบถาวร')) {
                syncDataOptimistic({ id }, 'delete'); 
            }
        }

        function resetForm() {
            isEditing = false;
            document.getElementById('transaction-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerText = "ลงบันทึกใหม่";
            document.getElementById('submit-text').innerText = "บันทึกรายการ";
            document.getElementById('btn-cancel').classList.add('hidden');
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            setType('expense');
        }

        function updateCharts(inc, exp, items) {
            const commonOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { font: { size: 10 } } } } };
            
            // Bar Chart
            const barCtx = document.getElementById('barChart').getContext('2d');
            if (barChart) barChart.destroy();
            barChart = new Chart(barCtx, { 
                type: 'bar', 
                data: { labels: ['รายรับ', 'รายจ่าย'], datasets: [{ data: [inc, exp], backgroundColor: ['#10b981', '#f43f5e'], borderRadius: 15, barThickness: 60 }] }, 
                options: commonOptions 
            });

            // Pie Chart
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            if (pieChart) pieChart.destroy();
            const cats = {};
            items.filter(t => t.type === 'expense').forEach(t => cats[t.category] = (cats[t.category] || 0) + t.amount);
            
            pieChart = new Chart(pieCtx, { 
                type: 'doughnut', 
                data: { 
                    labels: Object.keys(cats), 
                    datasets: [{ 
                        data: Object.values(cats), 
                        backgroundColor: ['#3b82f6', '#8b5cf6', '#ec4899', '#f97316', '#eab308', '#06b6d4', '#84cc16'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }] 
                }, 
                options: { ...commonOptions, cutout: '70%', plugins: { legend: { display: true, position: 'right', labels: { boxWidth: 10, font: { size: 10, weight: 'bold' }, padding: 15 } } } } 
            });
        }

        // Initialize
        window.onload = () => {
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            render(); 
            fetchData();
        };
    </script>
</body>
</html>
